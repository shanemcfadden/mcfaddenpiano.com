name: lint
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  run-linters:
    name: Run linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/jod'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Run ESlint
        uses: wearerequired/lint-action@v1
        with:
          auto_fix: true
          continue_on_error: false
          eslint: true
